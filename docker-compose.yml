version: '3.9'
services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports: ['8000:8000']
    environment:
      DATABASE_URL: postgresql+psycopg://sentinelguard:sentinelguard@postgres:5432/sentinelguard
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on: [postgres, redis]
  worker:
    build: .
    command: celery -A app.tasks.celery_app.celery_app worker -l info
    environment:
      DATABASE_URL: postgresql+psycopg://sentinelguard:sentinelguard@postgres:5432/sentinelguard
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on: [postgres, redis]
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinelguard
      POSTGRES_USER: sentinelguard
      POSTGRES_PASSWORD: sentinelguard
    ports: ['5432:5432']
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
