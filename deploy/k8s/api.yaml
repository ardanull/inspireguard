apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelguard-api
  namespace: sentinelguard
spec:
  replicas: 2
  selector:
    matchLabels: { app: sentinelguard-api }
  template:
    metadata:
      labels: { app: sentinelguard-api }
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/path: /metrics
        prometheus.io/port: '8000'
    spec:
      containers:
        - name: api
          image: sentinelguard/enterprise:5.0.0
          env:
            - { name: DATABASE_URL, value: postgresql+psycopg://sentinelguard:sentinelguard@postgres:5432/sentinelguard }
            - { name: REDIS_URL, value: redis://redis:6379/0 }
            - { name: CELERY_BROKER_URL, value: redis://redis:6379/1 }
            - { name: CELERY_RESULT_BACKEND, value: redis://redis:6379/2 }
          ports: [{ containerPort: 8000 }]
